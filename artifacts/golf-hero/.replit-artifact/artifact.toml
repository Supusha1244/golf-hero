kind = "web"
previewPath = "/"
title = "GolfHero"
version = "1.0.0"
id = "artifacts/golf-hero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20152

[services.development]
run = "pnpm --filter @workspace/golf-hero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/golf-hero", "run", "build" ]
publicDir = "artifacts/golf-hero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20152"
BASE_PATH = "/"
